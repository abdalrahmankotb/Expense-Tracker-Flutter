name: expense_tracker
description: A new Flutter project.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_screenutil: ^5.9.3
  intl: ^0.20.2
  firebase_ui_auth: ^3.0.0
  firebase_core: ^4.1.0
  firebase_auth: ^6.0.2
  google_sign_in: ^6.1.0
  firebase_ui_oauth_google: ^2.0.0
  cloud_firestore: ^6.0.1
  provider: ^6.1.5  
  fl_chart: ^1.1.1
  firebase_messaging: ^16.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true

  assets:
    - asset/

  fonts:
    - family: Poppins
      fonts:
        - asset: asset/fonts/Poppins/Poppins-Regular.ttf
          weight: 400
        - asset: asset/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: asset/fonts/Poppins/Poppins-SemiBold.ttf
          weight: 600
        - asset: asset/fonts/Poppins/Poppins-Bold.ttf
          weight: 700
